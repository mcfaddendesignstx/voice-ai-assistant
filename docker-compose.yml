# ╔══════════════════════════════════════════════════════════════════╗
# ║  Voice AI Assistant — Docker Compose Stack                      ║
# ║  Requires: Docker Desktop with NVIDIA GPU support enabled       ║
# ║  GPU: RTX 5090 (Blackwell) — needs driver 570+, CUDA 12.8+     ║
# ╚══════════════════════════════════════════════════════════════════╝

services:
  # ── LiveKit Server ─────────────────────────────────────────────
  # NATIVE — runs directly on Windows (not in Docker).
  # Docker Desktop for Windows cannot hairpin UDP, which breaks WebRTC ICE
  # between containers and the host. Running LiveKit natively solves this.
  #
  # Start it with:  .\livekit-bin\livekit-server.exe --config livekit.yaml
  # It listens on :7880 (HTTP/WS), :7881 (TCP ICE), :50000-50020 (UDP media).

  # ── Ollama (LLM) ──────────────────────────────────────────────
  # Local LLM inference. Models are cached in a Docker volume.
  # First run: docker compose exec ollama ollama pull llama3.1:8b
  # ── Ollama ──────────────────────────────────────────────────────
  # SKIPPED — using native Windows Ollama (already running on host port 11434).
  # The agent reaches it via http://host.docker.internal:11434.
  # To switch back to Docker Ollama, uncomment the block below.
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   networks:
  #     - voice-ai
  #   restart: unless-stopped

  # ── faster-whisper (STT) ───────────────────────────────────────
  # Speech-to-Text via OpenAI-compatible /v1/audio/transcriptions.
  # Uses float16 compute — safest on new Blackwell GPUs.
  whisper:
    image: fedirz/faster-whisper-server:latest-cuda
    environment:
      - WHISPER__MODEL=${WHISPER_MODEL:-Systran/faster-whisper-large-v3}
      - WHISPER__DEVICE=cuda
      - WHISPER__COMPUTE_TYPE=float16
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - voice-ai
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 120s           # Model loading takes time

  # ── Kokoro (TTS) ──────────────────────────────────────────────
  # Text-to-Speech via OpenAI-compatible /v1/audio/speech.
  # Streams audio back for low-latency playback.
  kokoro:
    build: ./kokoro
    # Custom image: kokoro-fastapi-gpu + PyTorch cu128 for SM_120 (Blackwell/RTX 5090).
    # If the build fails, fall back to: image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - voice-ai
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8880/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  # ── Qwen3-TTS ────────────────────────────────────────────────
  # Text-to-Speech via OpenAI-compatible /v1/audio/speech.
  # Model: Qwen3-TTS-12Hz-0.6B-CustomVoice (GPU, bfloat16).
  # Optional — only needed if user selects "qwen3-tts" in the UI.
  qwen3-tts:
    build: ./qwen3-tts
    environment:
      - QWEN3_TTS_MODEL=${QWEN3_TTS_MODEL:-Qwen/Qwen3-TTS-12Hz-0.6B-CustomVoice}
      - QWEN3_TTS_DEVICE=cuda:0
      - QWEN3_TTS_SPEAKER=${QWEN3_TTS_SPEAKER:-Ethan}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - voice-ai
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8890/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 180s

  # ── Token Server ───────────────────────────────────────────────
  # Lightweight FastAPI service that mints LiveKit JWTs.
  # The iOS app calls this before connecting to LiveKit.
  token-server:
    build: ./token-server
    ports:
      - "8082:8082"
    environment:
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_EXTERNAL_URL=${LIVEKIT_EXTERNAL_URL}
    networks:
      - voice-ai
    restart: unless-stopped
    # LiveKit runs natively on the host — no Docker dependency needed.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── LiveKit Agent ──────────────────────────────────────────────
  # Python agent that joins every LiveKit room and provides the
  # STT → LLM → TTS voice pipeline.
  agent:
    build: ./agent
    environment:
      - LIVEKIT_URL=${LIVEKIT_URL:-ws://host.docker.internal:7880}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - WHISPER_BASE_URL=${WHISPER_BASE_URL:-http://whisper:8000/v1}
      - WHISPER_MODEL=${WHISPER_MODEL:-Systran/faster-whisper-large-v3}
      - KOKORO_BASE_URL=${KOKORO_BASE_URL:-http://kokoro:8880/v1}
      - KOKORO_MODEL=${KOKORO_MODEL:-kokoro}
      - KOKORO_VOICE=${KOKORO_VOICE:-am_adam}
      - QWEN3_TTS_BASE_URL=${QWEN3_TTS_BASE_URL:-http://qwen3-tts:8890/v1}
      - QWEN3_TTS_VOICE=${QWEN3_TTS_VOICE:-ethan}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3-flash-preview}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-cjVigY5qzO86Huf0OWal}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - MEMORY_ENABLED=${MEMORY_ENABLED:-true}
      - MEMORY_MATCH_THRESHOLD=${MEMORY_MATCH_THRESHOLD:-0.5}
      - MEMORY_MATCH_COUNT=${MEMORY_MATCH_COUNT:-5}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - voice-ai
    restart: unless-stopped
    # LiveKit runs natively on the host — no Docker dependency needed.

networks:
  voice-ai:
    driver: bridge

volumes:
  ollama_data:
