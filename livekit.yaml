# LiveKit Server Configuration
# Docs: https://docs.livekit.io/home/self-hosting/deployment/

port: 7880
bind_addresses:
  - ""

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50020
  # Running natively on Windows — LiveKit binds directly to host interfaces.
  # No Docker NAT issues; ICE candidates use real host IPs automatically.
  use_external_ip: false
  enable_loopback_candidate: true

# API key : secret pairs — keep secret in production
keys:
  devkey: secret_change_me_in_production

logging:
  level: info
